# Service Identifier
# Used by Eureka Discovery and other microservices to locate this instance
spring.application.name=PAYMENT-SERVICE

# Network Port Configuration
# Running on 8085 to separate it from User (8081), Product (8082), Order (8083), and Cart (8084)
server.port=8085

# Database Configuration (MySQL)
# Targeting the 'sneakerproject' schema used across the Case Study microservices
spring.datasource.url=jdbc:mysql://localhost:3306/sneakerproject
spring.datasource.username=springstudent
spring.datasource.password=springstudent

# JPA / Hibernate Settings
# Automatically updates the schema (tables/columns) based on the @Entity classes
spring.jpa.hibernate.ddl-auto=update

# Feign Client Configuration
# Enables detailed logging for debugging inter-service communication with ORDER-SERVICE
logging.level.org.springframework.cloud.openfeign=DEBUG
# Timeout settings (5 seconds) to prevent the service from hanging if ORDER-SERVICE is slow/down
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000

# Business Logic Configuration
# Simulation mode: 'random' (50/50 success), 'success' (forced), or 'failure' (forced)
payment.simulation.mode=random

# Service Discovery (Eureka)
# Registering this service with the central Eureka Registry
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
# Tell SpringDoc the base path as seen through the gateway
server.forward-headers-strategy=framework

springdoc.api-docs.resolve-schema-properties=true
springdoc.override-with-generic-response=false