# Service Identifier
# This name is used by Eureka and Feign clients to locate the service
spring.application.name=ORDER-SERVICE

# Network Port Configuration
# Running on 8083 to avoid conflicts with Product (8082) and User (8081) services
server.port=8083

# Service Discovery (Eureka)
# Pointing to the central Eureka Discovery Server
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# Prefer registering with IP address over hostname for better reliability in local/container environments
eureka.instance.prefer-ip-address=true

# Database Connectivity (MySQL)
# Targeting the 'sneakerproject' schema
spring.datasource.url=jdbc:mysql://localhost:3306/sneakerproject
spring.datasource.username=springstudent
spring.datasource.password=springstudent

# JPA / Hibernate Configuration
# 'update' will automatically modify the schema to match Entity changes without deleting data
spring.jpa.hibernate.ddl-auto=update
# Useful for debugging: prints generated SQL queries to the console logs
spring.jpa.show-sql=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
# Tell SpringDoc the base path as seen through the gateway
server.forward-headers-strategy=framework

springdoc.api-docs.resolve-schema-properties=true
springdoc.override-with-generic-response=false