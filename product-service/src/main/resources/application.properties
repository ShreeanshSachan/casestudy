# Service Identifier
spring.application.name=PRODUCT-SERVICE

# Network Port Configuration
server.port=8082

# Service Discovery: Registers the service with the Eureka Server located at port 8761
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
# Instructs Eureka to use the IP address of the service instead of its hostname for registration
eureka.instance.prefer-ip-address=true

# Database Connectivity: Connects to the MySQL schema 'sneakerproject'
spring.datasource.url=jdbc:mysql://localhost:3306/sneakerproject
spring.datasource.username=springstudent
spring.datasource.password=springstudent

# Hibernate/JPA: Automatically updates the database schema to match Entity changes on startup
spring.jpa.hibernate.ddl-auto=update

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
# Tell SpringDoc the base path as seen through the gateway
server.forward-headers-strategy=framework

springdoc.api-docs.resolve-schema-properties=true
springdoc.override-with-generic-response=false